# Scripted mock responses for examples/workflows/software-development-team.yaml
# (ravana.runtime.mock.MockAgentRuntime). Each node's list is consumed in
# order per dispatch, clamped to the last entry once exhausted.
responses:
  pm_intake:
    - structured_payload: { requirement_clarity: "LOW" }
    - structured_payload: { requirement_clarity: "HIGH", milestone_plan: { items: ["build the thing"] } }

  sa_design:
    - structured_payload: { system_spec: { stack: "python" } }

  dev_code:
    - structured_payload: {}

  # qa_test declares join: all (§3.8), so sa_design's broadcast arrival and
  # dev_code's arrival produce ONE dispatch per cycle, not two — call counts
  # here are exact: first run FAILs (drives one bugfix loop), second PASSes.
  qa_test:
    - structured_payload: { qa_status: "FAIL", qa_report: { defects: ["off-by-one"] } }
    - structured_payload: { qa_status: "PASS", qa_report: {} }

  pm_final_review:
    - structured_payload: { pm_verdict: "COMPLETE" }
